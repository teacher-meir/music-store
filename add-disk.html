<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Add Disk</title>
		<link rel="stylesheet" href="styles/add-disk.css" />
		<script type="module" src="scripts/add-disk.js"></script>
	</head>
	<body>
		<div class="container">
			<h1>Add Disk</h1>
			<form novalidate>
				<label for="my-title">Title</label>
				<input
					type="text"
					id="my-title"
					name="title"
                    required
					placeholder="CD title.."
				/>

				<label for="artist">Artist</label>
				<input
					type="text"
					id="artist"
					name="artist"
					placeholder="CD artist.."
				/>

				<label for="country">Country</label>
				<select id="country" name="country">
					<option value="EU">Europe</option>
					<option value="UK">United Kingdom</option>
					<option value="USA">United State of America</option>
				</select>

				<label for="year">year</label>
				<input
					type="number"
					id="year"
					name="year"
				/>

                <!-- כפתור בטופס ברירת מחדל מסוג סבמיט - שולח את הטופס -->
				<button>Add Disk</button>
				<button type="reset">Reset</button>
			</form>
		</div>
	</body>
</html>
